<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Altus Soluções Digitais - Cartão de visitas digital. Conecte-se conosco e descubra como elevar o posicionamento da sua empresa na web.">
    <title>Altus Soluções Digitais | Links Úteis</title>
    
    <!-- Fonte Premium do Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: #0d0e12;
            color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            padding: 20px;
        }

        /* Container do Logotipo Oficial */
        .logo-container {
            width: 110px;
            height: 110px;
            background-color: #ffffff;
            border-radius: 24px; /* Cantos suavizados modernos */
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 8px;
            box-shadow: 0 10px 30px rgba(0, 114, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #9ca3af;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        /* Estrutura de Botões (Links) */
        .links-area {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 40px;
        }

        .btn {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Botão Destaque Principal (WhatsApp) */
        .btn-primary {
            background-color: #25d366;
            color: #fff;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
        }

        /* Botões Estilo Vidro/Corporativo */
        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.03);
            color: #f3f4f6;
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        /* Botão do Site/Portfólio (Gera curiosidade) */
        .btn-gradient {
            background: linear-gradient(135deg, rgba(0, 114, 255, 0.1), rgba(0, 198, 255, 0.1));
            color: #00c6ff;
            border: 1px solid rgba(0, 198, 255, 0.3);
            font-weight: 600;
        }

        .btn-gradient:hover {
            background: linear-gradient(135deg, rgba(0, 114, 255, 0.2), rgba(0, 198, 255, 0.2));
            transform: translateY(-2px);
        }

        /* Rodapé de Venda Passiva */
        .footer-cta {
            font-size: 0.8rem;
            color: #6b7280;
            text-decoration: none;
            display: inline-block;
            transition: color 0.3s;
        }

        .footer-cta span {
            color: #00c6ff;
            text-decoration: underline;
        }

        .footer-cta:hover {
            color: #9ca3af;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Cabeçalho da Marca com Logotipo Oficial -->
        <div class="logo-container">
            <img src="assets/logo.png" alt="Altus Soluções Digitais Logo" class="logo-img">
        </div>
        <h1>Altus Soluções Digitais</h1>
        <p class="subtitle">Elevando o posicionamento e as vendas do seu negócio através de soluções digitais inteligentes</p>

        <!-- Lista de Links Otimizada -->
        <div class="links-area">
            <!-- Link Isca para o Site Completo -->
            <a href="../index.html" class="btn btn-gradient">
                Conheça Nossos Serviços & Planos
            </a>

            <!-- Contatos Diretos -->
            <a href="https://wa.me/SEUNUMERODOWHATSAPP" target="_blank" class="btn btn-primary">
                Fale Conosco no WhatsApp
            </a>

            <a href="mailto:contato@altusdigital.net.br" class="btn btn-secondary">
                E-mail Corporativo
            </a>
        </div>

        <!-- Rodapé Comercial -->
        <a href="https://wa.me/SEUNUMERODOWHATSAPP?text=Quero%20um%20cartao%20digital%20como%20o%20seu" target="_blank" class="footer-cta">
            Quer um cartão exclusivo como este para sua empresa? <span>Clique aqui</span>
        </a>
    </div>

</body>
</html>
